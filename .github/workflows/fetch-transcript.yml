name: Fetch YouTube Transcript

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: false
        default: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'
      languages:
        description: 'Language preferences (comma-separated, e.g., te,hi,en)'
        required: false
        default: ''

jobs:
  fetch-transcript:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Fetch transcript
      run: |
        if [ -n "${{ github.event.inputs.languages }}" ]; then
          python transcript_fetcher.py "${{ github.event.inputs.video_url }}" "${{ github.event.inputs.languages }}"
        else
          python transcript_fetcher.py "${{ github.event.inputs.video_url }}"
        fi
      continue-on-error: true
    
    - name: List transcript files
      run: |
        echo "Transcript files created:"
        ls -lh *_transcript.txt 2>/dev/null || echo "No transcript files found"
    
    - name: Upload transcripts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: transcripts
        path: '*_transcript.txt'
        if-no-files-found: warn
    
    - name: Display transcript preview
      run: |
        for file in *_transcript.txt; do
          if [ -f "$file" ]; then
            echo "==================================="
            echo "File: $file"
            echo "==================================="
            head -20 "$file"
            echo ""
            echo "... (showing first 20 lines)"
            echo ""
          fi
        done
